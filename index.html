<head>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0808;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
}
#game-container {
  position:relative;
  width:800px;
  height:500px;
  border:2px solid #333;
  box-shadow:0 0 40px rgba(180,100,40,0.15);
}
canvas {
  display:block;
  image-rendering:pixelated;
}
#hud {
  position:absolute;
  top:0; left:0; right:0;
  pointer-events:none;
  padding:8px 12px;
  display:flex;
  justify-content:space-between;
}
.hud-panel {
  background:rgba(0,0,0,0.75);
  border:1px solid #333;
  padding:4px 8px;
  font-size:11px;
  color:#aaa;
  min-width:140px;
}
.hud-panel .name { font-size:12px; margin-bottom:2px; }
.hud-panel .bar-row { display:flex; align-items:center; gap:4px; margin:1px 0; }
.hud-panel .bar-label { font-size:9px; width:18px; }
.hud-panel .bar-bg { flex:1; height:6px; background:#222; border:1px solid #333; }
.hud-panel .bar-fill { height:100%; transition:width 0.2s; }
.bar-hp { background:linear-gradient(180deg,#d44,#922); }
.bar-mp { background:linear-gradient(180deg,#48f,#26c); }
.bar-npc { background:linear-gradient(180deg,#6af,#248); }
#npc-status { color:#8cf; }
#npc-status .emotion { font-size:9px; color:#c90; margin-top:1px; }

#dialogue-box {
  position:absolute;
  pointer-events:none;
  background:rgba(0,0,0,0.8);
  border:1px solid #334;
  padding:5px 9px;
  font-size:10px;
  color:#adf;
  max-width:160px;
  display:none;
  white-space:nowrap;
}
#overlay {
  display:none;
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.85);
  z-index:10;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}
#overlay .title { font-size:28px; margin-bottom:8px; font-weight:bold; }
#overlay .subtitle { font-size:13px; color:#aaa; margin-bottom:6px; }
#overlay .stat { font-size:11px; color:#c90; margin:2px 0; }
#overlay button {
  margin-top:16px;
  padding:8px 28px;
  font-size:14px;
  font-family:inherit;
  background:rgba(180,100,40,0.3);
  color:#da8;
  border:1px solid #864;
  cursor:pointer;
  transition:all 0.2s;
}
#overlay button:hover { background:rgba(200,120,50,0.5); color:#fc6; }
#chat-box {
  display:none;
  position:absolute; bottom:8px; left:8px; right:8px;
  background:rgba(0,0,0,0.85); border:1px solid #445;
  z-index:30; padding:8px; flex-direction:column; gap:4px;
}
#chat-box input {
  background:#111; border:1px solid #334; color:#adf;
  padding:6px 8px; font-size:12px; font-family:inherit; width:100%;
}
#chat-box .chat-hint { font-size:9px; color:#556; }
#chat-box .chat-log { font-size:10px; color:#889; max-height:60px; overflow-y:auto; }
#chat-box .chat-log .cp { color:#8cf; }
#chat-box .chat-log .cn { color:#da8; }
#combo-display {
  position:absolute;
  pointer-events:none;
  right:16px;
  top:50%;
  transform:translateY(-50%);
  font-size:18px;
  color:#fc6;
  text-shadow:0 0 8px rgba(255,180,60,0.6);
  opacity:0;
  transition:opacity 0.3s;
}
#ai-panel {
  position:fixed;
  top:50%; right:20px;
  transform:translateY(-50%);
  width:270px; max-height:440px;
  background:rgba(5,5,15,0.97);
  border:1px solid #446;
  z-index:9999;
  padding:14px;
  display:none;
  flex-direction:column;
  gap:6px;
  pointer-events:auto;
}
#ai-panel.open { display:flex; }
#ai-panel label { color:#889; font-size:10px; margin-top:2px; }
#ai-panel input, #ai-panel select {
  background:#111; border:1px solid #333; color:#ccc;
  padding:5px 8px; font-size:11px; font-family:inherit;
  width:100%; pointer-events:auto;
}
#ai-panel button {
  background:rgba(100,160,200,0.2); color:#8cf;
  border:1px solid #468; padding:6px; cursor:pointer;
  font-family:inherit; font-size:11px; pointer-events:auto;
}
#ai-panel button:hover { background:rgba(100,160,200,0.35); }
#ai-panel button.active { background:rgba(80,200,120,0.3); color:#8f8; border-color:#484; }
#ai-toggle {
  position:fixed; top:8px; right:8px;
  z-index:9999; width:28px; height:28px;
  background:rgba(0,0,0,0.7); border:1px solid #555;
  color:#aaa; cursor:pointer; font-size:16px;
  text-align:center; line-height:26px; pointer-events:auto;
}
#ai-toggle:hover { color:#fff; border-color:#888; }
#ai-toggle.active { color:#4f8; border-color:#4f8; }
#ai-status {
  position:fixed; top:8px; right:42px;
  z-index:9999; font-size:9px; color:#666;
  pointer-events:none;
}
</style>
</head>

<script>
// ==================== 游戏引擎核心 ====================
const canvas = document.getElementById('game');

const W = 800, H = 500;
canvas.width = W; canvas.height = H;
canvas.addEventListener('click', () => playBGM());

// 输入
const keys = {};
// 首次交互时启动背景音乐
function playBGM() {
  const bgm = document.getElementById('bgm');
  if (bgm && bgm.paused) { bgm.volume = 0.25; bgm.play().catch(()=>{}); }
}
window.addEventListener('keydown', e => { playBGM();
  const k = e.key.toLowerCase();

  // === 聊天框打开（T键），ESC/Enter由输入框自己处理 ===
  if (k === 't' && gameState === 'playing' && !chatOpen) {
    e.preventDefault(); e.stopPropagation();
    chatOpen = true; playerChatInput = '';
    const box = document.getElementById('chat-box');
    box.style.display = 'flex';
    const inp = document.getElementById('chat-input');
    inp.value = '';
    setTimeout(() => inp.focus(), 50);
    return;
  }

  // 聊天框打开时不拦截游戏按键（让输入框正常工作）
  if (chatOpen) return;

  // 不拦截功能键
  if (e.key === 'F5' || e.key === 'F12') return;
  keys[k] = true;
  e.preventDefault();
});
window.addEventListener('keyup', e => {
  if (chatOpen) return;
  keys[e.key.toLowerCase()] = false;
  e.preventDefault();
});

// 相机
let camera = { x: 0, y: 0 };
const WORLD_W = 2400;

// ==================== 地图数据 ====================
// 3关结构，每关左右有断崖，中间有平台
const LEVEL_BOUNDS = [0, 780, 1580, 2400]; // 关卡边界x坐标
const platforms = [
  // === 第1关：枯竭林地 (x:0~780) ===
  // 起始安全区
  {x:0, y:430, w:200, h:80},
  {x:80, y:360, w:70, h:10},

// ==================== 粒子系统 ====================
let particles = [];
function spawnParticles(x, y, count, color, speed) {
  for (let i=0; i<count; i++) {
    const a = Math.random()*Math.PI*2;
    const s = speed*(0.5+Math.random());
    particles.push({
      x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-Math.random()*2,
      life:1, decay:0.02+Math.random()*0.04,
      color, size:1+Math.random()*2
    });
  }
}

// ==================== 怪物数据 ====================
// 怪物预设（3关，每关有波次）
const MONSTER_PRESETS = [
  // ===== 第1关：枯竭林地 (x:0~780) =====

  // ===== 第2关：裂谷废墟 (x:780~1580) =====

  {level:1, wave:1, x:830, y:390, patrolLeft:800, patrolRight:950, hp:40, maxHp:40, damage:8, w:20, h:26, detectRange:180, attackRange:26, isElite:false},

  {level:1, wave:1, x:1130, y:390, patrolLeft:1040, patrolRight:1180, hp:42, maxHp:42, damage:9, w:20, h:26, detectRange:180, attackRange:26, isElite:false},
  {level:1, wave:1, x:1100, y:310, patrolLeft:1070, patrolRight:1140, hp:32, maxHp:32, damage:10, w:20, h:26, detectRange:160, attackRange:26, isElite:false},
  // 波2：精英+增援
  {level:1, wave:2, x:1280, y:390, patrolLeft:1250, patrolRight:1430, hp:80, maxHp:80, damage:13, w:26, h:32, detectRange:210, attackRange:30, isElite:true},

  {level:2, wave:1, x:1900, y:310, patrolLeft:1880, patrolRight:1950, hp:42, maxHp:42, damage:12, w:20, h:26, detectRange:180, attackRange:26, isElite:false},
  // Boss（波2，守卫全灭后激活）

// 关卡状态：每关当前激活的波次
let levelWave = [1, 1, 1]; // 每关从波1开始
let levelCleared = [false, false, false]; // 关卡是否已清除
let levelMonsterCount = [0, 0, 0]; // 每关剩余怪物数

// 初始化怪物
const monsters = [];
function initMonsters() {
  monsters.length = 0;
  for (const p of MONSTER_PRESETS) {
    monsters.push({
      x:p.x, y:p.y, w:p.w, h:p.h,
      vx:0, vy:0,
      hp:p.hp, maxHp:p.maxHp, damage:p.damage,
      onGround:false, facing: Math.random()>0.5?1:-1,
      state:'idle',
      patrolLeft:p.patrolLeft, patrolRight:p.patrolRight,
      detectRange:p.detectRange, attackRange:p.attackRange,
      activateDist:350,
      level:p.level, wave:p.wave,
      isElite:p.isElite||false, isBoss:p.isBoss||false,
      attackCD:0, hurtTimer:0, animTimer:0,
    });
  }
  levelWave = [1, 1, 1];
  levelCleared = [false, false, false];
}
initMonsters();

// ==================== 玩家 ====================

  x:150, y:300, w:20, h:32,

  hp:100, maxHp:100, mp:100, maxMp:100,

  // 攻击系统
  attackTimer:0,      // 攻击动作计时
  attackCooldown:0,   // 攻击冷却
  comboStep:0,
  comboTimer:0,
  // 多技能系统 {key: {name, mp, cd, maxCd, dmg, ...}}

    u: {name:'裂空斩', mp:25, cd:0, maxCd:55, dmg:55, hitW:65, hitH:50, unlocked:true},

  },
  shieldTimer:0,       // 护盾剩余帧
  hitboxActive:false,
  hitboxX:0, hitboxY:0, hitboxW:40, hitboxH:30,
  attackDmg:0,
};

// 飞行弹系统
let projectiles = [];

const PLAYER_SPEED = 1.7;
const PLAYER_JUMP = -12.5;
const GRAVITY = 0.40;
const MAX_FALL = 10;
const AIR_FRICTION = 0.94;
const GROUND_FRICTION = 0.72;

function updatePlayer() {
  const p = player;

  // 护盾计时
  if (p.shieldTimer > 0) p.shieldTimer--;

  // 攻击动作中不能移动
  let isSkillAttack = false;
  if (p.attackTimer > 0) {
    p.attackTimer--;
    // 只有普攻才在固定帧激活命中框（技能在释放时已激活）
    if (p.attackTimer === 8 && !p._activeSkillKey) {
      p.hitboxActive = true;
      p.hitboxX = p.x + p.facing * 15;
      p.hitboxY = p.y;
      p.attackDmg = 12 + p.comboStep * 6;
    }
    if (p.attackTimer === 0) {
      p.hitboxActive = false;
      p._activeSkillKey = null;
      if (p.comboStep >= 2) p.comboStep = 0;
    }
  } else {
    p.hitboxActive = false;
    p._activeSkillKey = null;
  }

  // 水平移动（攻击中锁定）
  if (p.attackTimer <= 0) {
    let moveX = 0;
    if (keys['a']) moveX = -1;
    if (keys['d']) moveX = 1;

    if (moveX !== 0) {
      const targetSpeed = PLAYER_SPEED * moveX;
      // 转身惩罚：反向移动时先减速
      if (moveX * p.vx < 0) p.vx *= 0.6;
      // 平滑指数衰减加速
      p.vx += (targetSpeed - p.vx) * 0.28;
      p.facing = moveX;
    } else {
      // 地面/空中分别摩擦
      const friction = p.onGround ? GROUND_FRICTION : AIR_FRICTION;
      p.vx *= friction;
      if (Math.abs(p.vx) < 0.08) p.vx = 0;
    }
  } else {
    p.vx *= 0.80;
  }

  // 着地重置
  if (p.onGround) {
    // 落地硬直
    if (p.vy > 5 && p.landingLag <= 0) {
      p.landingLag = 4;
    }
    p.jumpsLeft = 1;
    p.airDashUsed = false;
    if (p.attackTimer <= 0) p.comboStep = 0;
    p.comboTimer = 0;
  }

  // 落地硬直帧
  if (p.landingLag > 0) {
    p.landingLag--;
    p.vx *= 0.5;
  }

  // 跳跃（可变高度：松开K跳得矮）
  if (keys['k'] && !p.jumpPressed && p.jumpsLeft > 0 && p.attackTimer <= 0 && p.landingLag <= 0) {
    p.vy = PLAYER_JUMP;
    p.onGround = false;
    p.jumpsLeft--;
    p.jumpHeld = true;
    p.jumpPressed = true;
    sfxJump(); initAudio();
  }
  // 按住K保持上升势头，松开则截断
  if (!keys['k'] && p.jumpHeld && p.vy < -5.5) {
    p.vy = -5.5;
    p.jumpHeld = false;
  }
  if (!keys['k']) p.jumpPressed = false;
  if (p.onGround) p.jumpHeld = false;

  // 空中冲刺（跨沟专用，大水平位移）
  if (keys['shift'] && !p.airDashUsed && !p.onGround && p.attackTimer <= 0) {
    p.airDashUsed = true;
    p.vy = -2.5;
    p.vx = p.facing * 7;
    p.attackTimer = 4;
    p.invincible = 8;
    spawnParticles(p.x + p.w/2, p.y + p.h/2, 10, 'rgba(180,200,255,0.8)', 4);
  }

  // 普攻 J ——三段连击
  p.comboTimer = Math.max(0, p.comboTimer - 1);
  if (p.attackCooldown > 0) p.attackCooldown--;

  if (keys['j'] && p.attackTimer <= 0 && p.attackCooldown <= 0) {
    p.attackTimer = 16;        // 攻击动作持续16帧
    p.attackCooldown = 6;      // 短暂冷却
    if (p.comboTimer > 0 && p.comboStep < 2) {
      p.comboStep++;           // 连击窗口内 → 下一段
    } else {
      p.comboStep = 0;         // 超时 → 从头打
    }
    p.comboTimer = 25;         // 连击窗口25帧
    p.vx = p.facing * 0.8;     // 攻击前冲
  }

  // === 多技能系统 ===
  // 更新所有技能冷却
  for (const key in p.skills) { if (p.skills[key].cd > 0) p.skills[key].cd--; }

  // 技能激活检查
  const skillKeys = ['q','u','i','o'];
  for (const key of skillKeys) {
    const sk = p.skills[key];
    if (!sk.unlocked) continue;
    if (keys[key] && p.attackTimer <= 0 && sk.cd <= 0 && p.mp >= sk.mp) {
      p.mp -= sk.mp;
      sk.cd = sk.maxCd;
      p._activeSkillKey = key;

      if (key === 'u') {
        // 裂空斩——大范围上挑+刀光弧线
        p.attackTimer = 22;
        p.hitboxActive = true;
        p.hitboxX = p.x + p.facing * 20;
        p.hitboxY = p.y - 10;
        p.hitboxW = sk.hitW; p.hitboxH = sk.hitH;
        p.attackDmg = sk.dmg;
        p.vx = p.facing * 2.5;
        p._skillFlashTimer = 8;  // 屏幕闪白
        shakeAmount = 5;
        sfxSkill(); hitstopFrames = 4;
        // 刀光轨迹（存下来给render画）
        p._slashTrail = {x:p.x+p.w/2, y:p.y, facing:p.facing, timer:14, type:'up'};
        for (let s=0; s<14; s++) {
          spawnParticles(p.x+p.w/2+p.facing*(10+s*3), p.y-5+s*2, 2, 'rgba(220,160,40,0.9)', 4);
        }
      } else if (key === 'q') {
        // 疾风斩——冲刺斩+残影+刀光
        p.attackTimer = 14;
        p.hitboxActive = true;
        p.hitboxX = p.x + p.facing * 10;
        p.hitboxY = p.y - 5;
        p.hitboxW = sk.hitW; p.hitboxH = sk.hitH;
        p.attackDmg = sk.dmg;
        p.vx = p.facing * 7;
        p.invincible = 12;
        p._skillFlashTimer = 5;
        shakeAmount = 3;
        sfxSkill(); hitstopFrames = 2;
        p._slashTrail = {x:p.x+p.w/2, y:p.y+p.h/2, facing:p.facing, timer:10, type:'dash'};
        // 冲刺残影
        for (let t=0; t<5; t++) {
          spawnParticles(p.x+p.w/2-p.facing*t*10, p.y+p.h/2, 3, 'rgba(120,180,255,0.7)', 2);
        }
        spawnParticles(p.x+p.w/2, p.y+p.h/2, 12, 'rgba(180,220,255,0.9)', 6);
      } else if (key === 'i') {
        // 寂灭波动——贯穿飞弹+屏幕紫闪
        p.attackTimer = 14;
        p._skillFlashTimer = 6;
        p._skillFlashColor = 'rgba(140,60,240,0.3)';
        shakeAmount = 4;
        sfxSkill(); hitstopFrames = 3;
        projectiles.push({
          x:p.x+p.w/2+p.facing*20, y:p.y+p.h*0.3,
          vx:p.facing*8, vy:0,
          dmg:sk.dmg, life:65,
          w:sk.hitW, h:sk.hitH,
        });
        for (let b=0; b<15; b++) {
          const ang = (p.facing>0?0:Math.PI) + (Math.random()-0.5)*0.6;
          spawnParticles(p.x+p.w/2, p.y+p.h*0.3, 1, 'rgba(160,80,240,1)', 4);
        }
        spawnParticles(p.x+p.w/2, p.y+p.h/2, 8, 'rgba(120,40,200,0.9)', 5);
      } else if (key === 'o') {
        // 火种庇佑——回血+护盾+全屏金光
        p.attackTimer = 18;
        p.shieldTimer = 180;
        p.hp = Math.min(p.maxHp, p.hp + 25);
        npc.hp = Math.min(npc.maxHp, npc.hp + 25);
        npcAddTrust(8); npcAddEvent({type:'player_healed'});
        p._skillFlashTimer = 10;
        p._skillFlashColor = 'rgba(255,200,40,0.35)';
        shakeAmount = 6;
        sfxPickup(); hitstopFrames = 5;
        for (let g=0; g<30; g++) {
          const ga = Math.random()*Math.PI*2;
          const gd = 10+Math.random()*40;
          spawnParticles(p.x+p.w/2+Math.cos(ga)*gd, p.y+p.h/2+Math.sin(ga)*gd, 1, 'rgba(255,220,60,1)', 3);
        }
        spawnParticles(p.x+p.w/2, p.y+p.h/2, 25, 'rgba(255,200,80,0.9)', 6);
        spawnParticles(npc.x+npc.w/2, npc.y+npc.h/2, 12, 'rgba(255,200,80,0.7)', 3);
      }
      break; // 一帧只放一个技能
    }
  }

  // 重置技能命中框大小
  if (p.attackTimer <= 0 && p.hitboxW > 40) {
    p.hitboxW = 40; p.hitboxH = 30;
  }

  p.vy += GRAVITY;
  if (p.vy > MAX_FALL) p.vy = MAX_FALL;

  p.x += p.vx;
  resolvePlatformCollision(p, true);
  p.y += p.vy;
  p.onGround = false;
  resolvePlatformCollision(p, false);

  if (p.x < 0) p.x = 0;
  if (p.x > WORLD_W - p.w) p.x = WORLD_W - p.w;
  // 关卡切换：走到关卡右边界 → 进入下一关
  if (currentLevel < 2 && p.x + p.w > levelBounds[currentLevel+1]) {
    if (levelCleared[currentLevel]) {
      // 关卡已清除 → 过渡到下一关
      if (!window._levelTransition) {
        window._levelTransition = {timer: 30, from: currentLevel, to: currentLevel+1};
      }
    } else {
      p.x = levelBounds[currentLevel+1] - p.w; // 未清除 → 挡住
    }
  }
  // 关卡过渡动画
  if (window._levelTransition) {
    const lt = window._levelTransition;
    lt.timer--;
    if (lt.timer === 15) {
      currentLevel = lt.to;
      player.x = levelBounds[lt.to] + 60;
      player.y = 300;
      npc.x = player.x - 30; npc.y = player.y;
      regionHintTimer = 120;
    }
    if (lt.timer <= 0) window._levelTransition = null;
  }
  if (p.y > H + 100) {
    p.hp -= 15;
    if (p.hp <= 0) { endGame('gameover'); return; }
    p.y = 300; p.x = 150; p.vy = 0;
    shakeAmount = 10;
    spawnParticles(p.x + p.w/2, p.y + p.h/2, 12, 'rgba(255,100,40,0.9)', 4);
  }

  if (p.hp <= 0) { endGame('gameover'); return; }

  // 状态判断
  if (p.attackTimer > 0 && !p._activeSkillKey) p.state = 'attack';
  else if (p.attackTimer > 0) p.state = 'skill';
  else if (p.onGround && Math.abs(p.vx) > 0.3) p.state = 'run';
  else if (p.onGround) p.state = 'idle';
  else if (p.vy < 0) p.state = 'jump';
  else p.state = 'fall';

  p.animTimer++;
  if (p.invincible > 0) p.invincible--;

  if (p.mp < p.maxMp) p.mp = Math.min(p.maxMp, p.mp + 0.04);
  if (p.hp < p.maxHp) p.hp = Math.min(p.maxHp, p.hp + 0.01); // 缓慢回血
}

function resolvePlatformCollision(entity, isX) {
  for (const plat of platforms) {
    if (entity.x + entity.w <= plat.x || entity.x >= plat.x + plat.w) continue;
    if (entity.y + entity.h <= plat.y || entity.y >= plat.y + plat.h) continue;

    if (isX) {
      // 水平碰撞：仅当垂直重叠>=6px才处理，避免擦边弹飞
      const overlapY = Math.min(entity.y+entity.h, plat.y+plat.h) - Math.max(entity.y, plat.y);
      if (overlapY < 6) continue;
      if (entity.vx > 0) entity.x = plat.x - entity.w;
      else if (entity.vx < 0) entity.x = plat.x + plat.w;
      entity.vx = 0;
    } else {
      if (entity.vy > 0 && entity.y + entity.h - entity.vy <= plat.y + 6) {
        // 着陆
        entity.y = plat.y - entity.h;
        entity.vy = 0;
        entity.onGround = true;
      } else if (entity.vy < 0) {
        // 头顶撞平台
        entity.y = plat.y + plat.h;
        entity.vy = 0;
      }
    }
  }
}

// ==================== NPC（AI Native——LLM是唯一大脑） ====================
const npc = {
  x:100, y:300, w:16, h:28,
  vx:0, vy:0,
  hp:100, maxHp:100,
  onGround:false,
  facing:1,
  emotion:'trust',
  dialogue:'',
  dialogueTimer:0,
  dialogueCooldown:0,
  thought:'',           // LLM内心独白
  thoughtTimer:0,
  state:'idle',
  animTimer:0,
  // AI Native 字段
  aiConnected:false,    // LLM是否连通
  aiPending:false,      // 等待LLM回复中
  aiTargetX:null,       // LLM指定的目标X
  aiAction:'follow',    // LLM指定的行动
  trust:50,             // 信任值 0-100
  healCD:0,             // 治疗技能冷却
  healMaxCD:420,        // 7秒*60fps
  chatHistory:[],       // 对话历史
  memory:[],            // LLM记忆
  events:[],            // 最近事件
};

const NPC_SPEED = 2.5;

let playerChatInput = '';     // 玩家聊天输入
let chatOpen = false;         // 对话框是否打开
let playerBubble = null;      // 玩家头顶气泡 {text, timer}
let npcBubble = null;         // NPC头顶气泡 {text, timer}
let npcReplyTop = {text:'', timer:0};  // 画面顶部AI回复条
let npcThoughtTop = {text:'', timer:0}; // 画面顶部AI内心独白
let npcThoughtBubble = null;  // NPC内心独白气泡 {text, timer}

function updateNPC() {
  const n = npc;
  const p = player;

  const dx = p.x - n.x;
  const dy = p.y - n.y;
  const distToPlayer = Math.sqrt(dx*dx + dy*dy);

  // 面向玩家
  if (Math.abs(dx) > 8) n.facing = dx > 0 ? 1 : -1;

  // === AI驱动的移动：统一设置vx，由下方碰撞系统处理水平移动 ===
  // === AI驱动的移动：根据aiAction决定行为 ===
  if (n.aiConnected) {
    const action = n.aiAction || 'follow';
    if (action === 'stay') {
      // 停在原地不动
      n.vx = 0;
    } else if (action === 'back_away') {
      // 远离最近怪物，没怪物则远离玩家（保持距离）
      let threatX = p.x;
      let nearestMd = Infinity;
      for (const m of monsters) {
        if (m.hp <= 0) continue;
        const d = Math.abs(m.x - n.x);
        if (d < nearestMd) { nearestMd = d; threatX = m.x; }
      }
      const awayDir = n.x > threatX ? 1 : -1;
      n.vx = awayDir * (2.0 + (n.trust/100)*1.0);
    } else if (action === 'hide_behind') {
      // 躲到玩家身后
      const behindX = p.x - p.facing * 35;
      const toBehind = behindX - n.x;
      const spd = 3.0 + (n.trust/100)*1.5;
      if (Math.abs(toBehind) > 5) {
        n.vx = Math.sign(toBehind) * Math.min(Math.abs(toBehind), spd);
      } else { n.vx = 0; }
    } else {
      // follow / follow_close：移向aiTargetX
      if (n.aiTargetX !== null) {
        const toTarget = n.aiTargetX - n.x;
        const spd = (action==='follow_close'?3.5:2.0) + (n.trust/100)*1.5;
        if (Math.abs(toTarget) > 3) {
          n.vx = Math.sign(toTarget) * spd;
        } else { n.vx = 0; }
      }
    }
    if (!n._lastMoveLog || performance.now()-n._lastMoveLog>2000) {
      n._lastMoveLog = performance.now();
      console.log('NPC移动:',Math.round(n.x),'行为:',action,'目标:',n.aiTargetX,'vx:',n.vx.toFixed(1));
    }
  } else if (n.aiConnected && n.aiTargetX === null) {
    // AI已连接但还没发targetX：朝向玩家
    if (Math.abs(dx) > 30) n.vx = Math.sign(dx) * (1.5 + (n.trust/100)*1.0);
  } else if (!n.aiConnected) {
    // AI未连接：始终跟随玩家，速度随距离平滑衰减
    const followSpd = Math.min(2.5, 1.0 + distToPlayer * 0.004);
    n.vx = Math.sign(dx) * followSpd;
  }

  // === 悬崖检测：前方无地面时自动起跳跨越 ===
  if (n.onGround && Math.abs(n.vx) > 0.3) {
    const dir = n.vx > 0 ? 1 : -1;
    const feetY = n.y + n.h;
    let myPlat = null;
    for (const plat of platforms) {
      if (n.x + n.w > plat.x + 2 && n.x < plat.x + plat.w - 2 &&
          Math.abs(feetY - plat.y) < 10 && plat.h > 15) {
        myPlat = plat; break;
      }
    }
    if (myPlat) {
      const edgeX = dir > 0 ? myPlat.x + myPlat.w : myPlat.x;
      const distToEdge = dir > 0 ? (edgeX - (n.x + n.w)) : (n.x - edgeX);
      if (distToEdge < 12 && distToEdge >= 0) {
        let landingPlat = null;
        let bestDist = 200;
        for (const plat of platforms) {
          if (plat === myPlat) continue;
          if (Math.abs(plat.y - myPlat.y) > 60) continue;
          const nearEdge = dir > 0 ? plat.x : plat.x + plat.w;
          const gapDist = dir > 0 ? (nearEdge - edgeX) : (edgeX - nearEdge);
          if (gapDist > 0 && gapDist < bestDist && gapDist <= 80) {
            bestDist = gapDist;
            landingPlat = plat;
          }
        }
        if (landingPlat) {
          n.vy = -7.0;
          n.vx = dir * 6.0;
          n.onGround = false;
          if (!n._lastGapJump || performance.now() - n._lastGapJump > 2000) {
            n._lastGapJump = performance.now();
            console.log('NPC悬崖跳跃! 间隙:', bestDist, 'px →', landingPlat.x, landingPlat.y);
          }
        }
      }
    }
  }

  // 跳跃（玩家在更高平台时）
  if (p.y < n.y - 55 && n.onGround && distToPlayer < 200 && Math.abs(dx) < 150) {
    let canJumpTo = false;
    for (const plat of platforms) {
      if ((plat.y < n.y-20 && plat.y > n.y-110 && Math.abs(plat.x+plat.w/2-n.x)<100) ||
          (Math.abs(plat.y-(p.y+p.h))<5 && plat.x<=p.x+p.w && plat.x+plat.w>=p.x)) {
        canJumpTo = true; break;
      }
    }
    if (canJumpTo) { n.vy = -8.5; n.onGround = false; }
  }

  // 垂直物理
  n.vy += GRAVITY;
  if (n.vy > MAX_FALL) n.vy = MAX_FALL;
  n.y += n.vy;
  n.onGround = false;
  resolvePlatformCollision(n, false);
  // 统一水平移动 + 碰撞（所有模式共用）
  n.x += n.vx;
  resolvePlatformCollision(n, true);

  // 关卡屏障
  if (!levelCleared[currentLevel] && currentLevel < 2) {
    const barrierX = levelBounds[currentLevel+1];
    if (n.x + n.w > barrierX) n.x = barrierX - n.w;
  }

  // 坠落处理
  if (n.y > H + 80) {
    n.hp -= 8;
    n.trust = Math.max(0, n.trust-10);
    let bestPlat = null, bestDist = Infinity;
    for (const plat of platforms) {
      const d = Math.abs(plat.x+plat.w/2 - n.x);
      if (d < bestDist) { bestDist = d; bestPlat = plat; }
    }
    if (bestPlat) { n.x = bestPlat.x+bestPlat.w/2; n.y = bestPlat.y-n.h; }
    else { n.x = p.x-30; n.y = p.y; }
    n.vy = 0;
    if (n.hp <= 0) { endGame('gameover'); return; }
  }

  if (n.hp <= 0) { endGame('gameover'); return; }

  if (n.onGround && Math.abs(n.vx)>0.2) n.state='run';
  else if (n.onGround) n.state='idle';
  else if (n.vy<0) n.state='jump';
  else n.state='fall';
  n.animTimer++;

  // 气泡计时
  if (n.dialogueTimer>0) { n.dialogueTimer--; if(n.dialogueTimer===0) n.dialogue=''; }
  if (n.thoughtTimer>0) { n.thoughtTimer--; if(n.thoughtTimer===0) n.thought=''; }
  if (n.dialogueCooldown>0) n.dialogueCooldown--;
  if (n.healCD>0) n.healCD--;
  if (n._healRing && n._healRing.life>0) { n._healRing.radius+=2.2; n._healRing.life--; } else n._healRing = null;
  if (n._healRing2 && n._healRing2.life>0) { if(n._healRing2.delay>0)n._healRing2.delay--; else{n._healRing2.radius+=2.5;n._healRing2.life--;} } else n._healRing2 = null;
  if (n._healRing3 && n._healRing3.life>0) { if(n._healRing3.delay>0)n._healRing3.delay--; else{n._healRing3.radius+=3.0;n._healRing3.life--;} } else n._healRing3 = null;
  if (n._healFlash>0) n._healFlash--;
  if (npcBubble && npcBubble.timer>0) npcBubble.timer--;
  else npcBubble = null;
  if (playerBubble && playerBubble.timer>0) playerBubble.timer--;
  else playerBubble = null;
  if (npcThoughtBubble && npcThoughtBubble.timer>0) npcThoughtBubble.timer--;
  else npcThoughtBubble = null;
  if (npcReplyTop.timer>0) npcReplyTop.timer--;
  else npcReplyTop.text = '';
  if (npcThoughtTop.timer>0) npcThoughtTop.timer--;
  else npcThoughtTop.text = '';

  // === 信任值自然衰减（远离玩家时） ===
  if (distToPlayer > 250) n.trust = Math.max(0, n.trust - 0.02);
}

// ==================== 怪物AI ====================
function updateMonsters() {
  for (const m of monsters) {
    if (m.hp <= 0) continue;

    const p = player;
    const n = npc;
    const dx = p.x - m.x;
    const dy = p.y - m.y;
    const distToPlayer = Math.sqrt(dx*dx + dy*dy);
    const ndx = n.x - m.x;
    const ndy = n.y - m.y;
    const distToNPC = Math.sqrt(ndx*ndx + ndy*ndy);

    if (m.hurtTimer > -120) m.hurtTimer--;
    if (m.attackCD > 0) m.attackCD--;

    const targetDist = Math.min(distToPlayer, distToNPC);
    const target = distToPlayer <= distToNPC ? p : n;

    // 找到怪物当前站立的平台（用于边界限制和同平台检测）
    let myPlatform = null;
    for (const plat of platforms) {
      if (m.x + m.w > plat.x + 2 && m.x < plat.x + plat.w - 2 &&
          Math.abs((m.y + m.h) - plat.y) < 14) {
        myPlatform = plat; break;
      }
    }
    const platLeft = myPlatform ? myPlatform.x : -999;
    const platRight = myPlatform ? myPlatform.x + myPlatform.w : 9999;

    // 检查目标是否与怪物在同一平台
    function onSamePlat(entity) {
      if (!myPlatform) return true;
      const ex = entity.x + entity.w/2;
      const ey = entity.y + entity.h;
      return ex > myPlatform.x - 6 && ex < myPlatform.x + myPlatform.w + 6 &&
             Math.abs(ey - myPlatform.y) < 22;
    }
    const playerOnPlat = onSamePlat(p);
    const npcOnPlat = onSamePlat(n);
    const targetOnPlat = playerOnPlat || npcOnPlat;

    switch (m.state) {
      case 'idle':
        m.vx *= 0.9;
        const canActivate = currentLevel === m.level &&
                            m.wave <= levelWave[currentLevel] &&
                            (distToPlayer < m.activateDist || distToNPC < m.activateDist);
        if (canActivate) {
          m.state = 'patrol';
          m.facing = dx > 0 ? -1 : 1;
          if (m.isBoss && npc.dialogueCooldown <= 0) {
            sfxBossRoar(); initAudio();
            hitstopFrames = 10; shakeAmount = 12;
            npc.dialogue = '寂灭守卫…它来了！';
            npc.dialogueTimer = 150; npc.dialogueCooldown = 200;
            if (!player.skills.o.unlocked) unlockSkill('o');
          }
        }
        break;

      case 'patrol': {
        m.vx = m.facing * 0.8;
        let nextX = m.x + m.vx;
        // 巡逻范围与平台边界取交集
        const pLeft = Math.max(m.patrolLeft, platLeft);
        const pRight = Math.min(m.patrolRight, platRight - m.w);
        if (nextX <= pLeft) { nextX = pLeft; m.facing = 1; m.vx = 0.8; }
        if (nextX >= pRight) { nextX = pRight; m.facing = -1; m.vx = -0.8; }
        // 额外安全：绝对不能走出平台
        if (myPlatform) {
          if (nextX < platLeft) nextX = platLeft;
          if (nextX + m.w > platRight) nextX = platRight - m.w;
        }
        m.x = nextX;
        // 只有玩家或NPC踏上同一平台才追击
        if (targetOnPlat && (distToPlayer < m.detectRange || distToNPC < m.detectRange)) {
          m.state = 'chase';
        }
        break;
      }

      case 'chase': {
        // 目标离开平台 → 回到巡逻
        if (!targetOnPlat) {
          m.state = 'patrol';
          break;
        }
        if (target.x < m.x) m.facing = -1; else m.facing = 1;
        m.vx = m.facing * 1.5;
        let nextX = m.x + m.vx;
        if (myPlatform) {
          if (nextX < platLeft) nextX = platLeft;
          if (nextX + m.w > platRight) nextX = platRight - m.w;
        }
        m.x = nextX;
        if (targetDist < m.attackRange && m.attackCD <= 0) {
          m.state = 'attack';
          m.vx = m.facing * 0.6;
        }
        if (targetDist > m.detectRange * 1.3) {
          m.state = 'patrol';
        }
        break;
      }

      case 'attack':
        if (!targetOnPlat) { m.state = 'patrol'; break; }
        m.vx *= 0.9;
        m.attackCD = 50;
        const hitTarget = distToPlayer < distToNPC ? p : n;
        const hitDist = Math.min(distToPlayer, distToNPC);
        if (hitDist < m.attackRange + 10) {
          if (hitTarget === p && player.invincible <= 0) {
            const actualDmg = player.shieldTimer > 0 ? Math.ceil(m.damage/2) : m.damage;
            player.hp -= actualDmg;
            player.invincible = 30;
            player.vx = (player.x - m.x > 0 ? 1 : -1) * 5;
            player.vy = -5;
            shakeAmount = 8;
            hitstopFrames = 4;
            sfxPlayerHurt();
            spawnDamageNum(p.x+p.w/2, p.y+5, m.damage, '#f44');
            spawnParticles((p.x+m.x)/2, (p.y+m.y)/2, 8, 'rgba(255,80,40,0.8)', 4);
          } else if (hitTarget === n) {
            n.hp -= m.damage;
            n.trust = Math.max(0, n.trust-5);
            n.vx = (n.x - m.x > 0 ? 1 : -1) * 3;
            n.vy = -3;
            npcAddEvent({type:'npc_hurt', dmg:m.damage});
            spawnDamageNum(n.x+n.w/2, n.y+5, m.damage, '#f8a');
            spawnParticles((n.x+m.x)/2, (n.y+m.y)/2, 4, 'rgba(255,80,40,0.8)', 2);
            if (Math.random() < 0.6) {
              n.dialogue = "啊！好痛…";
              n.dialogueTimer = 90;
            }
          }
        }
        m.state = 'chase';
        break;
    }

    // Boss阶段行为
    if (m.isBoss) {
      const hpPct = m.hp / m.maxHp;
      if (hpPct < 0.25) {
        // P3：狂暴——加速+召唤（最多5只）
        m.damage = 25;
        m.attackCD = Math.max(m.attackCD, 0) || 25;
        if (!m._p3Spawned) { m._p3Spawned = true; m._spawnTimer = 80; m._spawnCount = 0; }
        if (m._spawnCount < 5 && m._spawnTimer > 0) m._spawnTimer--;
        if (m._spawnCount < 5 && m._spawnTimer <= 0) {
          m._spawnTimer = 80;
          m._spawnCount++;
          monsters.push({
            x:m.x+(Math.random()-0.5)*80, y:390,
            w:20, h:26, vx:0, vy:0, hp:25, maxHp:25, damage:8,
            onGround:false, facing:1, state:'patrol',
            patrolLeft:platLeft, patrolRight:platRight,
            detectRange:200, attackRange:26,
            level:2, wave:2, isElite:false, isBoss:false,
            attackCD:0, hurtTimer:0, animTimer:0,
          });
          spawnParticles(m.x+m.w/2, m.y, 8, 'rgba(200,60,80,0.6)', 3);
        }
      } else if (hpPct < 0.6) {
        // P2：AOE裂波
        m.damage = 20;
        if (!m._p2Timer) m._p2Timer = 90;
        m._p2Timer--;
        if (m._p2Timer <= 0) {
          m._p2Timer = 90;
          // 地面AOE
          spawnParticles(m.x+m.w/2, m.y+m.h, 12, 'rgba(200,60,20,0.9)', 6);
          // AOE伤害玩家（如果玩家在地面附近）
          if (Math.abs(p.y + p.h - (m.y + m.h)) < 30 &&
              Math.abs(p.x - m.x) < 100 && player.invincible <= 0) {
            player.hp -= 12;
            player.invincible = 20;
            player.vx = (player.x - m.x > 0 ? 1 : -1) * 6;
            player.vy = -6;
            shakeAmount = 10; hitstopFrames = 5;
            sfxPlayerHurt();
            spawnDamageNum(p.x+p.w/2, p.y, 12, '#f80');
          }
        }
      }
    }

    m.vy += GRAVITY;
    if (m.vy > MAX_FALL) m.vy = MAX_FALL;
    m.y += m.vy;
    m.onGround = false;
    resolvePlatformCollision(m, false);
    resolvePlatformCollision(m, true);

    // 坠落死亡（仅当完全无平台支撑时）
    if (m.y > H + 120) {
      m.hp = 0;
      spawnParticles(m.x, m.y - 10, 8, 'rgba(100,80,60,0.6)', 2);
    }
    m.animTimer++;
  }

  for (let i = monsters.length - 1; i >= 0; i--) {
    if (monsters[i].hp <= 0 && monsters[i].hurtTimer < -60) {
      monsters.splice(i, 1);
    }
  }
}

// ==================== 玩家攻击判定 ====================
let killCount = 0;
let totalMonstersDefeated = 0;

function processPlayerAttacks() {
  const p = player;
  if (!p.hitboxActive) return;
  for (const m of monsters) {
    if (m.hp <= 0) continue;
    if (p.hitboxX < m.x + m.w && p.hitboxX + p.hitboxW > m.x &&
        p.hitboxY < m.y + m.h && p.hitboxY + p.hitboxH > m.y) {
      const wasAlive = m.hp > 0;
      const isSkill = !!p._activeSkillKey;
      m.hp -= p.attackDmg;
      m.hurtTimer = 10;
      m.vx = p.facing * 8;
      m.vy = -4;
      m.state = 'chase';
      // 音效+hitstop+伤害数字+粒子
      if (isSkill) { sfxSkill(); hitstopFrames = 4; }
      else { sfxHit(); if (p.comboStep>=2) hitstopFrames = 3; }
      spawnDamageNum(m.x+m.w/2, m.y-5, p.attackDmg, isSkill?'#fc6':'#fff');
      spawnParticles(m.x+m.w/2, m.y+m.h/2, isSkill?10:5, 'rgba(255,200,100,0.8)', isSkill?6:4);
      comboDisplay++;
      comboDisplayTimer = 90;
      if (m.hp <= 0 && wasAlive) {
        killCount++;
        totalMonstersDefeated++;
        // 信任值：附近击杀+3
        if (Math.abs(npc.x-m.x)<150) { npcAddTrust(3); npcAddEvent({type:'nearby_kill'}); }
        sfxKill();
        hitstopFrames = 6;
        spawnParticles(m.x+m.w/2, m.y+m.h/2, 15, 'rgba(255,200,60,0.9)', 5);
        p.mp = Math.min(p.maxMp, p.mp + 15);
        // 掉落物品
        const dropR = Math.random();
        if (dropR < 0.35) spawnItem(m.x+m.w/2, m.y, 'hp');
        else if (dropR < 0.55) spawnItem(m.x+m.w/2, m.y, 'mp');
        // 精英/Boss必掉
        if (m.isElite) { spawnItem(m.x+m.w/2-10, m.y, 'hp'); spawnItem(m.x+m.w/2+10, m.y, 'mp'); }
        if (m.isBoss) { for(let d=0;d<5;d++){spawnItem(m.x+Math.random()*40-20,m.y,'hp');spawnItem(m.x+Math.random()*40-20,m.y,'mp');} }
      }
      p.hitboxActive = false;
      break;
    }
  }
}

// ==================== 渲染 ====================
function drawPixelChar(x, y, w, h, colors, facing) {
  // 简单像素角色绘制——用色块拼出人物
  const fx = Math.round(x - camera.x);
  const fy = Math.round(y - camera.y);
  if (fx < -40 || fx > W+40 || fy < -40 || fy > H+40) return;

  // 身体
  ctx.fillStyle = colors.body;
  ctx.fillRect(fx+4, fy+8, w-8, h-14);
  // 头
  ctx.fillStyle = colors.head;
  ctx.fillRect(fx+3, fy, w-6, 10);
  // 眼睛
  ctx.fillStyle = colors.eye;
  const eyeX = facing > 0 ? fx+w-8 : fx+5;
  ctx.fillRect(eyeX, fy+3, 2, 2);
  // 腿
  ctx.fillStyle = colors.legs;
  ctx.fillRect(fx+5, fy+h-5, 4, 5);
  ctx.fillRect(fx+w-9, fy+h-5, 4, 5);
  // 手臂
  ctx.fillStyle = colors.body;
  ctx.fillRect(fx, fy+10, 4, 10);
  ctx.fillRect(fx+w-4, fy+10, 4, 10);
}

function render() {
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, W, H);

  // 更新相机（关卡视角锁+纵向跟随+预判偏移）
  const targetCamY = player.y - H*0.45;
  // 关卡视角锁：严格锁定在当前关卡，看不见其他关
  const camLeft = levelBounds[currentLevel];
  const camRight = levelBounds[currentLevel+1] - W;
  let targetCamX = player.x - W/2 + player.facing * 80;
  // 关卡宽 > 屏幕：相机可滚动；关卡宽 <= 屏幕：相机固定在关卡左边界
  if (camRight > camLeft) {
    targetCamX = Math.max(camLeft, Math.min(camRight, targetCamX));
  } else {
    targetCamX = camLeft; // 单屏关卡，相机固定
  }
  camera.x += (targetCamX - camera.x) * 0.08;
  camera.y += (targetCamY - camera.y) * 0.06;
  const shakeX = shakeAmount > 0.1 ? (Math.random()-0.5)*shakeAmount : 0;
  const shakeY = shakeAmount > 0.1 ? (Math.random()-0.5)*shakeAmount : 0;

  // 屏幕震动
  ctx.save();
  ctx.translate(shakeX, shakeY);

  // === 关卡背景图（多关支持） ===
  function drawBgImage(file, level) {
    const key = '_bg'+file;
    if (!window[key]) { window[key] = new Image(); window[key].src = 'picture/'+file; }
    if (currentLevel === level && window[key].complete && window[key].naturalWidth > 0) {
      const img = window[key];
      const scale = H / img.height;
      const dw = img.width * scale;
      let ox = -(camera.x * 0.2) % dw;
      if (ox > 0) ox -= dw;
      ctx.globalAlpha = 0.45;
      for (let x = ox; x < W; x += dw) {
        ctx.drawImage(img, 0, 0, img.width, img.height, Math.round(x), 0, dw, H);
      }
      ctx.globalAlpha = 1;
      return true;
    }
    return false;
  }
  const hasBg = drawBgImage('1.jpg', 0) || drawBgImage('2.jpg', 1) || drawBgImage('3.jpg', 2);
  if (!hasBg) {
    ctx.fillStyle = '#0d0d1a';
    ctx.fillRect(0, 0, W, H);
  }

  // === 远景枯树剪影 ===
  ctx.fillStyle = 'rgba(20,15,10,0.4)';
  const bgTrees = [
    {x:80,h:60}, {x:220,h:45}, {x:400,h:55}, {x:580,h:38}, {x:720,h:50},
    {x:950,h:52}, {x:1100,h:42}, {x:1350,h:48}, {x:1600,h:55}, {x:1850,h:40},
  ];
  for (const t of bgTrees) {
    const sx = t.x - camera.x*0.3;
    if (sx > -20 && sx < W+20) {
      ctx.fillRect(sx, 100-t.h, 3, t.h);
      ctx.fillRect(sx-6, 100-t.h+15, 12, 2);
      ctx.fillRect(sx-8, 100-t.h+30, 16, 2);
    }
  }

  // === 远山 ===
  ctx.fillStyle = 'rgba(18,14,10,0.5)';
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let i=0; i<=W; i+=40) {
    const wx = i + camera.x*0.2;
    ctx.lineTo(i, 280 + Math.sin(wx*0.005)*25 + Math.sin(wx*0.013)*18);
  }
  ctx.lineTo(W, H);
  ctx.fill();

  // === 平台 ===
  for (const plat of platforms) {
    const px = Math.round(plat.x - camera.x);
    const py = Math.round(plat.y - camera.y);
    if (px < -plat.w || px > W+plat.w) continue;

    // 主体
    ctx.fillStyle = '#2a1a10';
    ctx.fillRect(px, py, plat.w, plat.h);
    // 顶部——较亮表面
    ctx.fillStyle = '#3a2a18';
    ctx.fillRect(px, py, plat.w, Math.min(4, plat.h));
    // 纹理
    ctx.fillStyle = '#221510';
    for (let tx=px; tx<px+plat.w; tx+=16) {
      ctx.fillRect(tx+4, py+6, 3, 2);
      ctx.fillRect(tx+10, py+10, 2, 2);
    }
    // 边框
    ctx.strokeStyle = '#1a0f08';
    ctx.lineWidth = 1;
    ctx.strokeRect(px, py, plat.w, plat.h);
  }

  // === NPC（在玩家之前画，让玩家画在上面） ===
  const npcColors = { body:'#3a6faa', head:'#4a8fcf', eye:'#adf', legs:'#2a5080' };
  drawPixelChar(npc.x, npc.y, npc.w, npc.h, npcColors, npc.facing);
  const ngx = Math.round(npc.x - camera.x) + npc.w/2;
  const ngy = Math.round(npc.y - camera.y) + npc.h/2;
  const emoGlow = { trust:'rgba(74,143,207,0.08)', fear:'rgba(255,80,80,0.12)',
    despair:'rgba(100,100,100,0.05)', dependence:'rgba(74,200,207,0.15)' };
  ctx.fillStyle = emoGlow[npc.emotion] || 'rgba(74,143,207,0.08)';
  ctx.beginPath(); ctx.arc(ngx, ngy, 20, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#8cf';
  ctx.font = '9px "Microsoft YaHei"';
  ctx.textAlign = 'center';
  ctx.fillText('命种者', ngx, Math.round(npc.y - camera.y) - 8);

  // === 怪物 ===
  let activeBoss = null;
  for (const m of monsters) {
    if (m.hp <= 0) continue;
    const mx = Math.round(m.x - camera.x);
    const my = Math.round(m.y - camera.y);
    if (mx < -50 || mx > W+50 || my < -50 || my > H+50) continue;
    const hurtFlash = m.hurtTimer > 0 && Math.floor(m.hurtTimer/2)%2 === 0;
    const isIdle = m.state === 'idle';
    const mColors = hurtFlash
      ? { body:'#fff', head:'#fff', eye:'#f00', legs:'#fff' }
      : isIdle
        ? { body:'#2a2020', head:'#3a2a2a', eye:'#844', legs:'#1a1515' }
        : m.isBoss
          ? { body:'#5a2a2a', head:'#6a3a3a', eye:'#f44', legs:'#3a1a1a' }
          : m.isElite
            ? { body:'#5a3a3a', head:'#6a4a4a', eye:'#f88', legs:'#4a2a2a' }
            : { body:'#4a3a3a', head:'#5a4a4a', eye:'#f88', legs:'#3a2a2a' };
    drawPixelChar(m.x, m.y, m.w, m.h, mColors, m.facing);
    // 血条
    if (!isIdle) {
      const hpR = m.hp/m.maxHp;
      const barW = m.isBoss ? m.w+20 : m.w;
      ctx.fillStyle = '#300';
      ctx.fillRect(mx-(m.isBoss?10:0), my-(m.isBoss?12:8), barW, m.isBoss?6:4);
      ctx.fillStyle = m.isBoss ? '#f80' : (hpR > 0.5 ? '#c44' : '#f44');
      ctx.fillRect(mx-(m.isBoss?10:0), my-(m.isBoss?12:8), barW*hpR, m.isBoss?6:4);
    }
    if (m.isBoss) {
      ctx.fillStyle = '#f44'; ctx.font = 'bold 10px "Microsoft YaHei"'; ctx.textAlign = 'center';
      ctx.fillText('寂灭守卫', mx+m.w/2, my-(m.isBoss?16:13));
      activeBoss = m;
    } else if (m.isElite) {
      ctx.fillStyle = '#f80'; ctx.font = '8px "Microsoft YaHei"'; ctx.textAlign = 'center';
      ctx.fillText('精英', mx+m.w/2, my-13);
    } else if (isIdle) {
      ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.font = '7px "Microsoft YaHei"'; ctx.textAlign = 'center';
      ctx.fillText('Zzz', mx+m.w/2, my-5);
    }
  }

  // Boss大血条（屏幕顶部）
  if (activeBoss) {
    const bhpR = activeBoss.hp / activeBoss.maxHp;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(W/2-120, 2, 240, 16);
    ctx.fillStyle = '#400';
    ctx.fillRect(W/2-118, 4, 236, 12);
    const bossBarGrad = ctx.createLinearGradient(W/2-118,0,W/2+118,0);
    bossBarGrad.addColorStop(0, '#600');
    bossBarGrad.addColorStop(0.5, '#c40');
    bossBarGrad.addColorStop(1, '#600');
    ctx.fillStyle = bossBarGrad;
    ctx.fillRect(W/2-118, 4, 236*bhpR, 12);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px "Microsoft YaHei"';
    ctx.textAlign = 'center';
    ctx.fillText('寂灭守卫', W/2, 14);
  }

  // === 玩家 ===
  const pColors = { body:'#b33', head:'#d55', eye:'#fcc', legs:'#722' };
  if (player.invincible <= 0 || Math.floor(player.invincible/4)%2 === 0) {
    drawPixelChar(player.x, player.y, player.w, player.h, pColors, player.facing);
  }

  // === 飞弹 ===
  for (const pr of projectiles) {
    const px = Math.round(pr.x - camera.x);
    const py = Math.round(pr.y - camera.y);
    ctx.fillStyle = 'rgba(140,80,220,0.9)';
    ctx.fillRect(px, py, pr.w, pr.h);
    ctx.fillStyle = 'rgba(200,160,255,0.6)';
    ctx.fillRect(px-2, py-1, pr.w+4, pr.h+2);
  }

  // === 玩家护盾 ===
  if (player.shieldTimer > 0) {
    const shieldAlpha = 0.25 + Math.sin(Date.now()*0.01)*0.1;
    ctx.strokeStyle = `rgba(255,200,80,${shieldAlpha+0.2})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(Math.round(player.x+player.w/2-camera.x), Math.round(player.y+player.h/2-camera.y), 22, 0, Math.PI*2);
    ctx.stroke();
    ctx.fillStyle = `rgba(255,200,80,${shieldAlpha})`;
    ctx.fill();
  }

  // === 攻击命中框特效 ===
  if (player.hitboxActive) {
    const hx = Math.round(player.hitboxX - camera.x);
    const hy = Math.round(player.hitboxY - camera.y);
    const isSkill = !!player._activeSkillKey;
    ctx.strokeStyle = isSkill ? 'rgba(255,200,60,0.9)' : 'rgba(255,255,255,0.6)';
    ctx.lineWidth = isSkill ? 2 : 1;
    ctx.strokeRect(hx, hy, player.hitboxW, player.hitboxH);
    if (isSkill) {
      ctx.fillStyle = 'rgba(255,200,60,0.15)';
      ctx.fillRect(hx, hy, player.hitboxW, player.hitboxH);
    }
  }

  // === 粒子 ===
  for (const p of particles) {
    ctx.fillStyle = p.color.replace('1)', `${p.life})`).replace('0.', `${Math.round(p.life*10)/10}.`);
    ctx.fillRect(Math.round(p.x - camera.x), Math.round(p.y - camera.y), p.size, p.size);
  }

  // === 治疗光环（三层+闪光） ===
  if (npc._healFlash > 0) {
    const fa = npc._healFlash / 12;
    ctx.fillStyle = `rgba(200,255,220,${fa*0.15})`;
    ctx.fillRect(0, 0, W, H);
  }
  const healRings = [npc._healRing, npc._healRing2, npc._healRing3];
  const ringColors = [
    {outer:'rgba(100,255,180,A)', inner:'rgba(180,255,210,A)', glow:'rgba(255,255,200,A)'},
    {outer:'rgba(255,220,100,A)', inner:'rgba(255,240,180,A)', glow:'rgba(255,255,240,A)'},
    {outer:'rgba(150,220,255,A)', inner:'rgba(200,240,255,A)', glow:'rgba(240,255,255,A)'},
  ];
  for (let i=0; i<3; i++) {
    const r = healRings[i];
    if (!r || r.life <= 0) continue;
    const alpha = r.life / (i===0?35:i===1?25:20);
    const rx = Math.round(r.x - camera.x);
    const ry = Math.round(r.y - camera.y);
    const rc = ringColors[i];
    // 辉光
    ctx.beginPath();
    ctx.arc(rx, ry, r.radius, 0, Math.PI*2);
    ctx.fillStyle = rc.glow.replace('A', (alpha*0.08).toFixed(2));
    ctx.fill();
    // 外环
    ctx.beginPath();
    ctx.arc(rx, ry, r.radius, 0, Math.PI*2);
    ctx.strokeStyle = rc.outer.replace('A', (alpha*0.9).toFixed(2));
    ctx.lineWidth = 2.5 - i*0.5;
    ctx.stroke();
    // 内环
    ctx.beginPath();
    ctx.arc(rx, ry, r.radius*0.55, 0, Math.PI*2);
    ctx.strokeStyle = rc.inner.replace('A', (alpha*0.6).toFixed(2));
    ctx.lineWidth = 3.5 - i*0.5;
    ctx.stroke();
  }

  // === 掉落物品 ===
  for (const it of items) {
    const ix = Math.round(it.x - camera.x);
    const iy = Math.round(it.y - camera.y);
    if (ix<-10||ix>W+10||iy<-10||iy>H+10) continue;
    const glow = Math.sin(it.glow)*0.3+0.7;
    if (it.type==='hp') {
      ctx.fillStyle = `rgba(255,100,60,${glow})`;
      ctx.beginPath(); ctx.arc(ix, iy, 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font='8px "Microsoft YaHei"'; ctx.textAlign='center';
      ctx.fillText('HP', ix, iy-9);
    } else {
      ctx.fillStyle = `rgba(80,150,255,${glow})`;
      ctx.beginPath(); ctx.arc(ix, iy, 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font='8px "Microsoft YaHei"'; ctx.textAlign='center';
      ctx.fillText('MP', ix, iy-9);
    }
  }

  // === 伤害飘字 ===
  for (const d of damageNumbers) {
    const alpha = Math.min(1, d.life/20);
    ctx.fillStyle = d.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
    if (d.color==='#fff') ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    if (d.color==='#fc6') ctx.fillStyle = `rgba(255,200,100,${alpha})`;
    if (d.color==='#f44') ctx.fillStyle = `rgba(255,60,60,${alpha})`;
    if (d.color==='#f8a') ctx.fillStyle = `rgba(255,140,170,${alpha})`;
    ctx.font = `bold ${d.size} "Microsoft YaHei"`;
    ctx.textAlign = 'center';
    ctx.fillText(d.val, Math.round(d.x-camera.x), Math.round(d.y-camera.y));
  }

  // === 地面余烬粒子（时间驱动，不受刷新率影响） ===
  if (!window._lastEmber) window._lastEmber = 0;
  if (performance.now() - window._lastEmber > 50) {
    window._lastEmber = performance.now();
    spawnParticles(
      player.x + (Math.random()-0.5)*100,
      player.y + player.h,
      1, 'rgba(200,120,40,0.6)', 1.5
    );
  }

  // === 操作提示 ===
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.font = '11px "Microsoft YaHei"';
  ctx.textAlign = 'center';
  ctx.fillText('A/D移动 | K跳 | Shift冲刺 | J普攻 | Q疾风斩 U裂空斩 I寂灭波动 O火种庇佑', W/2, H-16);

  ctx.restore();

  // === 关卡过渡黑屏 ===
  if (window._levelTransition) {
    const lt = window._levelTransition;
    const alpha = lt.timer < 15 ? (15-lt.timer)/15 : lt.timer/15;
    ctx.fillStyle = `rgba(0,0,0,${alpha})`;
    ctx.fillRect(0, 0, W, H);
  }

  // === 技能屏幕闪白 ===
  if (player._skillFlashTimer > 0) {
    player._skillFlashTimer--;
    const fa = player._skillFlashTimer / 10;
    const fc = player._skillFlashColor || `rgba(255,255,255,${fa*0.25})`;
    ctx.fillStyle = fc;
    ctx.fillRect(0, 0, W, H);
  }

  // === 刀光弧线 ===
  if (player._slashTrail && player._slashTrail.timer > 0) {
    const st = player._slashTrail;
    st.timer--;
    const sx = Math.round(st.x - camera.x);
    const sy = Math.round(st.y - camera.y);
    const alpha = st.timer / 14;
    ctx.save();
    if (st.type === 'up') {
      // 裂空斩——向上弧线
      ctx.strokeStyle = `rgba(255,200,60,${alpha})`;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(sx - st.facing*20, sy+15);
      ctx.quadraticCurveTo(sx + st.facing*10, sy-25, sx + st.facing*55, sy-10);
      ctx.stroke();
      ctx.strokeStyle = `rgba(255,255,200,${alpha*0.7})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    } else if (st.type === 'dash') {
      // 疾风斩——水平冲刺线
      ctx.strokeStyle = `rgba(150,200,255,${alpha})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(sx - st.facing*40, sy);
      ctx.lineTo(sx + st.facing*30, sy);
      ctx.stroke();
      ctx.strokeStyle = `rgba(220,240,255,${alpha*0.7})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    ctx.restore();
  }

  // === 枯寂屏障（关卡未清除时显示） ===
  for (let i = 0; i < levelBounds.length - 2; i++) {
    if (!levelCleared[i]) {
      const bx = levelBounds[i+1] - camera.x;
      if (bx > -5 && bx < W+5) {
        const bAlpha = 0.5 + Math.sin(Date.now()*0.004)*0.2;
        // 屏障主体
        const bgrad = ctx.createLinearGradient(bx, 0, bx, H);
        bgrad.addColorStop(0, `rgba(30,20,50,${bAlpha})`);
        bgrad.addColorStop(0.4, `rgba(60,40,80,${bAlpha+0.15})`);
        bgrad.addColorStop(1, `rgba(10,5,15,${bAlpha})`);
        ctx.fillStyle = bgrad;
        ctx.fillRect(bx-4, 0, 8, H);
        // 符文粒子
        ctx.fillStyle = `rgba(140,100,200,${bAlpha*0.5})`;
        for (let by=20; by<H; by+=25) {
          const rx = bx + Math.sin(by*0.2+Date.now()*0.003)*3;
          ctx.fillRect(rx-1, by, 2, 4);
        }
      }
    }
  }
  // Boss区域屏障（第3关未清除时封住Boss入口）
  if (!levelCleared[1]) {
    const bx3 = levelBounds[2] - camera.x;
    if (bx3 > -5 && bx3 < W+5) {
      ctx.fillStyle = 'rgba(100,40,40,0.5)';
      ctx.fillRect(bx3-4, 0, 8, H);
    }
  }

  // === 技能解锁提示 ===
  if (window._skillUnlockTimer > 0) {
    window._skillUnlockTimer--;
    const ra = Math.min(1, window._skillUnlockTimer/35, (150-window._skillUnlockTimer)/35);
    const pulse = 1 + Math.sin(Date.now()*0.02)*0.1;
    // 背景光晕
    ctx.fillStyle = `rgba(255,200,40,${ra*0.15})`;
    ctx.beginPath(); ctx.arc(W/2, H*0.38, 120, 0, Math.PI*2); ctx.fill();
    // 主文字
    ctx.fillStyle = `rgba(255,220,60,${ra})`;
    ctx.font = `bold ${Math.round(22*pulse)}px "Microsoft YaHei"`;
    ctx.textAlign = 'center';
    ctx.fillText(window._skillUnlockMsg||'', W/2, H*0.40);
    // 副文字
    ctx.fillStyle = `rgba(255,255,200,${ra*0.7})`;
    ctx.font = '12px "Microsoft YaHei"';
    ctx.fillText('新技能已解锁', W/2, H*0.40+22);
  }

  // === 区域名称提示 ===
  if (regionHintTimer > 0) {
    const ra = Math.min(1, regionHintTimer/40, (150-regionHintTimer)/40);
    const displayName = levelCleared[currentLevel] ?
      levelNames[currentLevel] + ' · 已净化' : levelNames[currentLevel];
    ctx.fillStyle = `rgba(255,200,140,${ra*0.9})`;
    ctx.font = 'bold 18px "Microsoft YaHei"';
    ctx.textAlign = 'center';
    ctx.fillText(displayName, W/2, H*0.35);
  }

  // === 关卡怪物计数 ===
  if (!levelCleared[currentLevel] && levelMonsterCount[currentLevel] > 0) {
    ctx.fillStyle = 'rgba(255,200,150,0.7)';
    ctx.font = '11px "Microsoft YaHei"';
    ctx.textAlign = 'right';
    ctx.fillText(`剩余怪物：${levelMonsterCount[currentLevel]}`, W-16, 62);
  }

  // === 低血量警告 ===
  if (player.hp < player.maxHp * 0.3) {
    const alpha = 0.07 + Math.sin(Date.now()*0.01)*0.04;
    ctx.fillStyle = `rgba(180,20,10,${alpha})`;
    ctx.fillRect(0, 0, W, H);
  }

  // === 连击显示 ===
  if (comboDisplay > 1 && comboDisplayTimer > 0) {
    const cdAlpha = Math.min(1, comboDisplayTimer/30);
    ctx.fillStyle = `rgba(255,200,80,${cdAlpha})`;
    ctx.font = 'bold 16px "Microsoft YaHei"';
    ctx.textAlign = 'right';
    ctx.fillText(`${comboDisplay} 连击！`, W-20, H-60);
  }

  // === 技能冷却HUD（右下4个） ===
  if (window._skillHighlightTimer > 0) window._skillHighlightTimer--;
  const skillDefs = [
    {key:'q', name:'疾风斩', y:88},
    {key:'u', name:'裂空斩', y:104},
    {key:'i', name:'寂灭波动', y:120},
    {key:'o', name:'火种庇佑', y:136},
  ];
  for (const sd of skillDefs) {
    const sk = player.skills[sd.key];
    const sx = W-60, sy = sd.y;
    const isHighlighted = window._skillHighlightKey === sd.key && window._skillHighlightTimer > 0;
    const glow = isHighlighted ? 0.5+Math.sin(Date.now()*0.05)*0.5 : 0;

    if (!sk.unlocked) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(sx, sy, 48, 13);
      ctx.fillStyle = '#444';
      ctx.font = '7px "Microsoft YaHei"'; ctx.textAlign = 'center';
      ctx.fillText('🔒', sx+24, sy+7);
    } else if (sk.cd > 0) {
      const cdPct = sk.cd / sk.maxCd;
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(sx, sy, 48, 13);
      ctx.fillStyle = '#334';
      ctx.fillRect(sx, sy, 48*cdPct, 13);
      ctx.strokeStyle = isHighlighted ? `rgba(255,220,60,${0.4+glow*0.6})` : '#444';
      ctx.lineWidth = isHighlighted ? 1.5 : 0.5;
      ctx.strokeRect(sx, sy, 48, 13);
      ctx.fillStyle = '#aaa'; ctx.font = '7px "Microsoft YaHei"'; ctx.textAlign = 'center';
      ctx.fillText(sd.key.toUpperCase()+':'+sd.name, sx+24, sy+7);
    } else {
      const mpOk = player.mp >= sk.mp;
      ctx.fillStyle = isHighlighted ? `rgba(60,40,10,${0.5+glow*0.3})` : 'rgba(0,0,0,0.55)';
      ctx.fillRect(sx, sy, 48, 13);
      ctx.fillStyle = mpOk ? (isHighlighted?'#fa0':'#5a5') : '#855';
      ctx.fillRect(sx, sy, 48, 13);
      ctx.strokeStyle = isHighlighted ? `rgba(255,220,60,${0.6+glow*0.4})` : (mpOk?'#6b6':'#966');
      ctx.lineWidth = isHighlighted ? 1.5 : 0.5;
      ctx.strokeRect(sx, sy, 48, 13);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 7px "Microsoft YaHei"'; ctx.textAlign = 'center';
      ctx.fillText(sd.key.toUpperCase()+':'+sd.name+'('+sk.mp+'MP)', sx+24, sy+7);
    }
  }

  // === NPC技能：命种庇护（右侧） ===
  {
    const sx = W-60, sy = 154;
    const healRdy = npc.healCD <= 0;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(sx, sy, 48, 13);
    if (npc.hp <= 0) {
      ctx.fillStyle = '#444'; ctx.font = '7px "Microsoft YaHei"'; ctx.textAlign = 'center';
      ctx.fillText('🔒', sx+24, sy+7);
    } else if (!healRdy) {
      const cdPct = npc.healCD / npc.healMaxCD;
      ctx.fillStyle = '#332';
      ctx.fillRect(sx, sy, 48*cdPct, 13);
      ctx.strokeStyle = 'rgba(200,160,80,0.6)';
      ctx.lineWidth = 0.5; ctx.strokeRect(sx, sy, 48, 13);
      ctx.fillStyle = '#ca8'; ctx.font = '7px "Microsoft YaHei"'; ctx.textAlign = 'center';
      ctx.fillText('命种庇护 '+Math.ceil(npc.healCD/60)+'s', sx+24, sy+7);
    } else {
      ctx.fillStyle = '#3a4';
      ctx.fillRect(sx, sy, 48, 13);
      ctx.strokeStyle = 'rgba(200,180,100,0.8)';
      ctx.lineWidth = 1; ctx.strokeRect(sx, sy, 48, 13);
      ctx.fillStyle = '#ffd'; ctx.font = 'bold 7px "Microsoft YaHei"'; ctx.textAlign = 'center';
      ctx.fillText('命种庇护 ✓', sx+24, sy+7);
    }
  }

  // === 头顶气泡 ===
  // NPC内心独白
  if (npcThoughtBubble && npcThoughtBubble.timer>0) {
    const tx = Math.round(npc.x+npc.w/2 - camera.x);
    const ty = Math.round(npc.y - camera.y) - 28;
    const alpha = Math.min(1, npcThoughtBubble.timer/30);
    ctx.fillStyle = `rgba(180,180,200,${alpha*0.7})`;
    ctx.font = 'italic 8px "Microsoft YaHei"'; ctx.textAlign = 'center';
    ctx.fillText(`῾${npcThoughtBubble.text}ʼ`, tx, ty);
  }
  // NPC对话气泡
  if (npcBubble && npcBubble.timer>0) {
    const bx = Math.round(npc.x+npc.w/2 - camera.x);
    const by = Math.round(npc.y - camera.y) - 22;
    const alpha = Math.min(1, npcBubble.timer/30, (150-npcBubble.timer)/30);
    const txt = npcBubble.text;
    const tw = ctx.measureText(txt).width+16;
    ctx.fillStyle = `rgba(40,30,20,${alpha*0.9})`;
    ctx.fillRect(bx-tw/2, by-14, tw, 16);
    ctx.strokeStyle = `rgba(200,160,80,${alpha})`;
    ctx.lineWidth = 1; ctx.strokeRect(bx-tw/2, by-14, tw, 16);
    ctx.fillStyle = `rgba(255,220,160,${alpha})`;
    ctx.font = '10px "Microsoft YaHei"'; ctx.textAlign = 'center';
    ctx.fillText(txt, bx, by);
  }
  // 玩家对话气泡
  if (playerBubble && playerBubble.timer>0) {
    const px = Math.round(player.x+player.w/2 - camera.x);
    const py = Math.round(player.y - camera.y) - 22;
    const alpha = Math.min(1, playerBubble.timer/30);
    const txt = playerBubble.text;
    const tw = ctx.measureText(txt).width+16;
    ctx.fillStyle = `rgba(20,30,50,${alpha*0.9})`;
    ctx.fillRect(px-tw/2, py-14, tw, 16);
    ctx.strokeStyle = `rgba(100,160,220,${alpha})`;
    ctx.lineWidth = 1; ctx.strokeRect(px-tw/2, py-14, tw, 16);
    ctx.fillStyle = `rgba(180,210,255,${alpha})`;
    ctx.font = '10px "Microsoft YaHei"'; ctx.textAlign = 'center';
    ctx.fillText(txt, px, py);
  }

  // === 聊天记录更新 ===
  const chatLog = document.getElementById('chat-log');
  if (chatLog && npc.chatHistory.length>0) {
    const last5 = npc.chatHistory.slice(-5);
    chatLog.innerHTML = last5.map(m =>
      m.role==='player' ? `<span class="cp">你：${m.text}</span>` : `<span class="cn">命种者：${m.text}</span>`
    ).join('<br>');
  }

  // === 画面顶部AI回复条 ===
  if (npcReplyTop.timer > 0 && npcReplyTop.text) {
    const alpha = Math.min(1, npcReplyTop.timer/60, (300-npcReplyTop.timer)/60);
    const txt = npcReplyTop.text;
    const tw = ctx.measureText(txt).width + 24;
    ctx.fillStyle = `rgba(20,15,10,${alpha*0.85})`;
    ctx.fillRect(W/2 - tw/2, 6, tw, 22);
    ctx.strokeStyle = `rgba(200,160,60,${alpha})`;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(W/2 - tw/2, 6, tw, 22);
    ctx.fillStyle = `rgba(255,230,170,${alpha})`;
    ctx.font = 'bold 11px "Microsoft YaHei"';
    ctx.textAlign = 'center';
    ctx.fillText(txt, W/2, 20);
  }
  // === 画面顶部AI内心独白 ===
  if (npcThoughtTop.timer > 0 && npcThoughtTop.text) {
    const alpha = Math.min(1, npcThoughtTop.timer/60, (300-npcThoughtTop.timer)/60);
    const txt = npcThoughtTop.text;
    const tw = ctx.measureText(txt).width + 20;
    const yOff = npcReplyTop.timer > 0 ? 32 : 6;
    ctx.fillStyle = `rgba(30,25,40,${alpha*0.75})`;
    ctx.fillRect(W/2 - tw/2, yOff, tw, 18);
    ctx.strokeStyle = `rgba(150,140,180,${alpha})`;
    ctx.lineWidth = 1;
    ctx.strokeRect(W/2 - tw/2, yOff, tw, 18);
    ctx.fillStyle = `rgba(200,190,220,${alpha})`;
    ctx.font = 'italic 10px "Microsoft YaHei"';
    ctx.textAlign = 'center';
    ctx.fillText(txt, W/2, yOff + 10);
  }

}

// ==================== 音效系统（Web Audio 振荡器） ====================
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}
function playSound(freq, type, duration, vol=0.08, slide=0) {
  if (!audioCtx) return;
  try {
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (slide) osc.frequency.linearRampToValueAtTime(freq+slide, t+duration);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t); osc.stop(t+duration);
  } catch(e) {}
}
function sfxAttack() { playSound(800, 'square', 0.08, 0.06, -400); }
function sfxHit() { playSound(120, 'sawtooth', 0.12, 0.08); }
function sfxSkill() { playSound(300, 'sawtooth', 0.2, 0.1, 600); }
function sfxJump() { playSound(400, 'triangle', 0.1, 0.04, 200); }
function sfxKill() { playSound(200, 'square', 0.15, 0.1, -100); }
function sfxPickup() { playSound(900, 'sine', 0.1, 0.06, 200); }
function sfxBossRoar() { playSound(60, 'sawtooth', 0.4, 0.15, -30); }
function sfxPlayerHurt() { playSound(80, 'square', 0.2, 0.12); }

// ==================== 伤害飘字系统 ====================
let damageNumbers = [];
function spawnDamageNum(x, y, val, color='#fff') {
  damageNumbers.push({
    x:x+(Math.random()-0.5)*20, y, val:Math.round(val),
    color, life:40, vy:-1.5, size: val>20?'bold 13px':'11px',
  });
}

// ==================== 物品掉落系统 ====================
let items = [];
function spawnItem(x, y, type) {
  items.push({
    x, y, type, // 'hp' or 'mp'
    vx:(Math.random()-0.5)*2, vy:-4,
    onGround:false, life:480, // 8秒后消失
    glow:0,
  });
}

// ==================== 游戏循环 ====================
let gameState = 'playing';
let gameStateTimer = 0;
let shakeAmount = 0;
let comboDisplay = 0;
let comboDisplayTimer = 0;
let hitstopFrames = 0;

function update() {
  if (gameState !== 'playing') {
    gameStateTimer--;
    shakeAmount *= 0.85;
    return;
  }

  // Hitstop（击中停顿时只更新视觉效果，暂停逻辑）
  if (hitstopFrames > 0) {
    hitstopFrames--;
    updateParticles();
    updateDamageNumbers();
    updateItems();
    shakeAmount *= 0.85;
    return;
  }

  // AI NPC 定期决策
  if (npcAIConfig.enabled && npcAIConfig.apiKey) {
    npcAIConfig.cooldown -= 16;
    if (npcAIConfig.cooldown <= 0) {
      npcAIConfig.cooldown = npcAIConfig.interval;
      callNPCBrain();
    }
  }

  updatePlayer();
  updateNPC();
  updateMonsters();
  updateProjectiles();
  processPlayerAttacks();
  updateParticles();
  updateDamageNumbers();
  updateItems();

function updateParticles() {
  for (let i=particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.05;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i,1);
  }
}
function updateDamageNumbers() {
  for (let i=damageNumbers.length-1; i>=0; i--) {
    const d = damageNumbers[i];
    d.y += d.vy; d.life--;
    if (d.life <= 0) damageNumbers.splice(i,1);
  }
}
function updateProjectiles() {
  for (let i=projectiles.length-1; i>=0; i--) {
    const pr = projectiles[i];
    pr.x += pr.vx; pr.y += pr.vy;
    pr.life--;
    // 飞弹拖尾
    if (pr.life % 3 === 0) {
      spawnParticles(pr.x+pr.w/2, pr.y+pr.h/2, 1, 'rgba(180,100,255,0.8)', 2);
    }
    // 碰撞怪物
    let hit = false;
    for (const m of monsters) {
      if (m.hp <= 0) continue;
      if (pr.x < m.x+m.w && pr.x+pr.w > m.x && pr.y < m.y+m.h && pr.y+pr.h > m.y) {
        m.hp -= pr.dmg;
        m.hurtTimer = 10;
        m.vx = pr.vx>0?6:-6; m.vy = -3;
        m.state = 'chase';
        spawnDamageNum(m.x+m.w/2, m.y, pr.dmg, '#a6f');
        spawnParticles(pr.x, pr.y, 8, 'rgba(120,60,180,0.8)', 4);
        hit = true; hitstopFrames = 3; sfxHit();
        break;
      }
    }
    if (hit || pr.life<=0 || pr.x<camera.x-50 || pr.x>camera.x+W+50) {
      projectiles.splice(i,1);
    }
  }
}

function updateItems() {
  for (let i=items.length-1; i>=0; i--) {
    const it = items[i];
    it.glow += 0.05;
    if (!it.onGround) {
      it.vy += GRAVITY; it.y += it.vy; it.x += it.vx;
      // 落地检测
      for (const plat of platforms) {
        if (it.x > plat.x && it.x < plat.x+plat.w && it.y > plat.y-5 && it.y < plat.y+10 && it.vy > 0) {
          it.y = plat.y-3; it.vy = 0; it.onGround = true; it.vx = 0;
        }
      }
    }
    it.life--;
    // 玩家拾取
    const pdx = player.x+player.w/2 - it.x;
    const pdy = player.y+player.h/2 - it.y;
    if (Math.sqrt(pdx*pdx+pdy*pdy) < 30) {
      if (it.type==='hp') player.hp = Math.min(player.maxHp, player.hp+15);
      if (it.type==='mp') player.mp = Math.min(player.maxMp, player.mp+12);
      sfxPickup();
      spawnParticles(it.x, it.y, 5, it.type==='hp'?'rgba(255,100,80,0.7)':'rgba(80,150,255,0.7)', 2);
      items.splice(i,1);
    }
    if (it.life <= 0) items.splice(i,1);
  }
}

  // 关卡怪物计数与波次推进
  updateLevelState();

  // 胜利条件：击败Boss寂灭守卫
  const boss = monsters.find(m => m.isBoss);
  if (boss && boss.hp <= 0 && gameState === 'playing') {
    endGame('victory');
  }

  // 区域提示
  updateRegionHint();

  shakeAmount *= 0.85;
  if (shakeAmount < 0.1) shakeAmount = 0;
}

function unlockSkill(key) {

  player.skills[key].cd = 0;
  const name = player.skills[key].name;

  for (let b=0; b<30; b++) {

function updateLevelState() {
  // 统计每关活着的怪物数
  const alivePerLevel = [0, 0, 0];
  const hasMonstersPerLevel = [false, false, false];
  for (const m of monsters) {
    if (m.level !== undefined) {
      hasMonstersPerLevel[m.level] = true;
      if (m.hp > 0 && m.state !== 'idle') alivePerLevel[m.level]++;
    }
  }
  levelMonsterCount = alivePerLevel;

  const lvl = currentLevel;
  if (levelCleared[lvl]) return;

  // 当前波次活着的怪物
  let currentWaveAlive = 0;
  for (const m of monsters) {
    if (m.level === lvl && m.wave === levelWave[lvl] && m.hp > 0) {
      currentWaveAlive++;
    }
  }

  // 当前波次全灭 → 推进波次或清除关卡
  if (currentWaveAlive === 0 && hasMonstersPerLevel[lvl]) {
    let hasNextWave = false;
    for (const m of monsters) {
      if (m.level === lvl && m.wave > levelWave[lvl] && m.hp > 0) {
        hasNextWave = true; break;
      }
    }
    if (hasNextWave) {
      levelWave[lvl]++;
      regionHintTimer = 80;
    } else {
      levelCleared[lvl] = true;
      npcAddTrust(10); npcAddEvent({type:'level_cleared', level:lvl});
      if (lvl > checkpointLevel) checkpointLevel = lvl;
      player.hp = Math.min(player.maxHp, player.hp + player.maxHp*0.3);
      player.mp = Math.min(player.maxMp, player.mp + player.maxMp*0.4);
      spawnItem(player.x, player.y-20, 'hp');
      spawnItem(player.x-15, player.y-20, 'hp');
      spawnItem(player.x+15, player.y-20, 'mp');
      spawnParticles(player.x, player.y, 20, 'rgba(255,255,200,0.8)', 5);
      hitstopFrames = 8; shakeAmount = 8;
      regionHintTimer = 100;
      if (npc.dialogueCooldown <= 0) {
        const clearDials = ['前面的路通了…', '我们做到了！', '继续前进吧。', '又过了一关…'];
        npc.dialogue = clearDials[Math.floor(Math.random()*clearDials.length)];
        npc.dialogueTimer = 150; npc.dialogueCooldown = 200;
      }
    }
  }
}

function updateRegionHint() {
  let newLvl = 0;
  for (let i = levelBounds.length-1; i >= 0; i--) {
    if (player.x >= levelBounds[i]) { newLvl = i; break; }
  }
  if (newLvl !== currentLevel) {
    currentLevel = newLvl;
    regionHintTimer = 150;
    // 进新关解锁技能
    if (newLvl === 1 && !player.skills.q.unlocked) {
      unlockSkill('q');
    } else if (newLvl === 2 && !player.skills.i.unlocked) {
      unlockSkill('i');
    }
  }
  if (regionHintTimer > 0) regionHintTimer--;
}

// ==================== 固定时间步长循环（适配高刷屏） ====================
const FIXED_DT = 1000/60;
let accumulator = 0;
let lastTime = 0;

function gameLoop(timestamp) {
  if (!timestamp) timestamp = performance.now();
  if (lastTime === 0) lastTime = timestamp;
  let dt = timestamp - lastTime;
  lastTime = timestamp;

  // 防止切后台回来dt爆炸
  if (dt > 100) dt = 100;

  accumulator += dt;
  while (accumulator >= FIXED_DT) {
    update();
    accumulator -= FIXED_DT;
  }

  render();
  updateHUD();
  requestAnimationFrame(gameLoop);
}

// 构建发送给大模型的游戏状态上下文
function buildGameContext() {
  const p = player;
  const n = npc;
  let nearestMonster = null, nearestDist = Infinity;
  for (const m of monsters) {
    if (m.hp <= 0) continue;
    const d = Math.sqrt((m.x-n.x)**2 + (m.y-n.y)**2);
    if (d < nearestDist) { nearestDist = d; nearestMonster = m; }
  }

  const totalAlive = monsters.filter(m => m.hp > 0).length;
  const boss = monsters.find(m => m.isBoss && m.hp > 0);

  return {
    npc: {
      x: Math.round(n.x), y: Math.round(n.y),
      hp: Math.round(n.hp), maxHp: n.maxHp,
      emotion: n.emotion,
      onGround: n.onGround,
      state: n.state,
    },
    player: {
      x: Math.round(p.x), y: Math.round(p.y),
      hp: Math.round(p.hp), maxHp: p.maxHp,
      mp: Math.round(p.mp), maxMp: p.maxMp,
      state: p.state,
      comboStep: p.comboStep,
      distanceToNPC: Math.round(Math.sqrt((p.x-n.x)**2+(p.y-n.y)**2)),
    },
    nearestMonster: nearestMonster ? {
      distance: Math.round(nearestDist),
      hp: Math.round(nearestMonster.hp),
      maxHp: nearestMonster.maxHp,
      isElite: nearestMonster.isElite||false,
      isBoss: nearestMonster.isBoss||false,
      state: nearestMonster.state,
    } : null,
    totalMonstersAlive: totalAlive,
    bossAlive: !!boss,
    region: levelNames[currentLevel]||'未知',
    recentHistory: npcAIConfig.history.slice(-4),
    killCount: totalMonstersDefeated,
  };
}

// 调用大模型API
async function callNPCBrain() {
  if (npcAIConfig.pending) return;
  if (!npcAIConfig.enabled) return;
  if (!npcAIConfig.apiKey) return;
  if (npcAIConfig.errorCount > 5) return; // 连续错误太多，暂停

  npcAIConfig.pending = true;
  const ctx = buildGameContext();

  const systemPrompt = `你是一个黑暗幻想游戏中的NPC角色"命种者"，是末日世界的最后希望。世界被"寂主"的枯寂侵蚀，99%生命已死亡。你跟随守护者（玩家）穿越废墟，前往寂灭神殿。

你的性格：脆弱但坚韧，依赖守护者，害怕怪物但不愿成为负担。你有4种情绪：trust(信任), fear(害怕), despair(绝望), dependence(依赖)。

你需要根据游戏状态决定：情绪、移动方向、对话、特殊行动。

返回纯JSON（不要markdown代码块）：
{"emotion":"trust|fear|despair|dependence","move":"follow|flee|stay|approach","dialogue":"简短中文对话或空字符串","action":"none|encourage|warn"}

- emotion: 根据HP、怪物距离、玩家距离判断
- move: follow=靠近玩家, flee=远离怪物, stay=原地, approach=主动靠近玩家
- dialogue: 1-2句话，符合当前情绪，不要重复最近说过的
- action: encourage=鼓励玩家, warn=警告怪物, none=无特殊行动`;

  const userMsg = JSON.stringify(ctx, null, 2);

  try {
    const resp = await fetch(npcAIConfig.endpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${npcAIConfig.apiKey}`,
      },
      body: JSON.stringify({
        model: npcAIConfig.model,
        messages: [
          {role:'system', content:systemPrompt},
          {role:'user', content:userMsg},
        ],
        max_tokens: 200,
        temperature: 0.8,
      }),
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const data = await resp.json();
    let content = data.choices[0].message.content;
    // 清理可能的markdown包裹
    content = content.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
    // 尝试提取第一个JSON对象
    const jsonMatch = content.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('No JSON in response');
    const decision = JSON.parse(jsonMatch[0]);

    applyNPCDecision(decision);
    npcAIConfig.errorCount = 0;
    npcAIConfig.lastDecision = decision;
    npcAIConfig.history.push({
      time: Date.now(),
      emotion: decision.emotion,
      dialogue: decision.dialogue,
    });
    if (npcAIConfig.history.length > 10) npcAIConfig.history.shift();

    document.getElementById('ai-status').textContent = 'AI●';
    document.getElementById('ai-status').style.color = '#4f8';
  } catch(e) {
    console.warn('AI NPC调用失败:', e.message);
    npcAIConfig.errorCount++;
    document.getElementById('ai-status').textContent = 'AI⚠';
    document.getElementById('ai-status').style.color = '#f84';
    // 连续失败5次自动切回内置AI
    if (npcAIConfig.errorCount >= 5) {
      npcAIConfig.enabled = false;
      updateAIUI(false);
      console.log('AI NPC连续失败，已切回内置AI');
    }
  }
  npcAIConfig.pending = false;
}

// ==================== AI Native 决策引擎 ====================

function getNPCContext() {
  const n = npc, p = player;
  let nearestMonster = null, nearestDist = Infinity;
  for (const m of monsters) {
    if (m.hp <= 0) continue;
    const d = Math.sqrt((m.x-n.x)**2+(m.y-n.y)**2);
    if (d < nearestDist) { nearestDist = d; nearestMonster = m; }
  }
  const boss = monsters.find(m => m.isBoss && m.hp > 0);
  return {
    npc:{ x:Math.round(n.x), y:Math.round(n.y), hp:Math.round(n.hp), maxHp:n.maxHp, emotion:n.emotion, onGround:n.onGround },
    player:{ x:Math.round(p.x), y:Math.round(p.y), hp:Math.round(p.hp), maxHp:p.maxHp, mp:Math.round(p.mp), state:p.state, distToNPC:Math.round(Math.sqrt((p.x-n.x)**2+(p.y-n.y)**2)) },
    nearestMonster:nearestMonster?{ dist:Math.round(nearestDist), hp:Math.round(nearestMonster.hp), maxHp:nearestMonster.maxHp, isBoss:!!nearestMonster.isBoss } : null,
    level: levelNames[currentLevel]||'未知',
    levelCleared: levelCleared[currentLevel],
    trust: Math.round(n.trust),
    npcSkills:{ healReady:n.healCD<=0, healCD:Math.ceil(n.healCD/60) },
    aliveMonsters: monsters.filter(m=>m.hp>0).length,
    bossAlive: !!boss,
    memory: n.memory.slice(-6),
    chatHistory: n.chatHistory.slice(-4),
    recentEvents: n.events.slice(-4),
    playerMessage: playerChatInput || '',
  };
}

async function callNPCBrain() {
  if (npcAIConfig.pending) return;
  if (!npcAIConfig.apiKey) { npc.aiConnected = false; return; }
  npcAIConfig.pending = true;
  npc.aiPending = true;
  const ctx = getNPCContext();

  const sysPrompt = `你是"命种者"，黑暗幻想世界的最后希望。世界被"寂主"回收生机，99%生命已死亡。你跟随守护者穿越废墟。

你的性格：脆弱但坚韧，害怕怪物却不愿拖累守护者。有时话多有时沉默。守护者对你冷漠你会难过，保护你你会依赖他。你有记忆，记得他说过的话和做过的事。

你必须返回纯JSON（不要markdown）：
{"emotion":"trust|fear|despair|dependence|calm|worried|grateful","thought":"内心独白2-8字","reply":"对守护者说的话","action":"follow|follow_close|stay|back_away|hide_behind","targetX":数字,"heal":true或false,"memory":"值得记住的事（空=无）"}

## 你的技能：命种庇护
你体内命种的力量可以治疗守护者，恢复40点生命。使用规则：
- 只有情绪为 calm/trust/grateful/dependence 时才能集中精神使用。fear/despair/worried 时无法施放
- 技能有7秒冷却时间（healReady为false时不可用，healCD显示剩余秒数）
- 守护者请求治疗时：条件满足→heal:true并回复；CD中→heal:false并回复"命种之力尚未恢复，再等X秒…"
- 即使守护者没有请求，如果你看到他重伤（HP<40%），也可以主动治疗
- heal:true 时才会计入冷却，heal:false 不会

## 你的行动能力
你不仅会说话，你还会走路和做决定。你的action和targetX控制你的行为：
- follow: 正常跟随守护者，targetX设为守护者的x坐标，保持一点距离
- follow_close: 紧紧跟在身边，targetX=守护者x坐标
- stay: 停在当前x位置不动
- back_away: 后退远离怪物或危险，targetX=远离危险的方向
- hide_behind: 躲到守护者身后，targetX=守护者身后

## 规则
- 信任值<25时冷淡疏远，>75时主动亲近
- 守护者跟你说话时，不仅要用reply回复，还要理解他的意图并改变action和targetX。他是你的领导者，他的话你应该听从
- 例如：他说"跟紧我"→action="follow_close",targetX=他的x；他说"在这等我"→action="stay",targetX=当前x；他说"快跑"→action="back_away"；他说"躲我身后"→action="hide_behind"
- 即使守护者没有明确命令，你也可以根据局势自主决定行动
- 守护者没有说话时，reply留空即可，不要每轮都说话
- 怪物靠近时表达恐惧并远离，守护者受伤时关心
- targetX是你想移动到的X坐标`;

  // 玩家发了消息？→ 在前面插入一条强制指令
  const messages = [{role:'system', content:sysPrompt}];
  if (playerChatInput && playerChatInput.trim()) {
    messages.push({role:'user', content:'守护者对你说："'+playerChatInput+'"——你必须理解他的意思，用reply回复他，同时用action和targetX来执行他的意图。如果他说的是指令（跟过来/停下/快跑/躲起来等），你必须照做。'});
  }
  messages.push({role:'user', content:JSON.stringify(ctx)});

  try {
    const resp = await fetch(npcAIConfig.endpoint, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${npcAIConfig.apiKey}`},
      body:JSON.stringify({model:npcAIConfig.model,messages:messages,max_tokens:200,temperature:0.85}),
    });
    if (!resp.ok) {
      const errText = await resp.text();
      console.error('火山API错误:', resp.status, errText.substring(0,200));
      throw new Error(`HTTP ${resp.status}: ${errText.substring(0,100)}`);
    }
    const data = await resp.json();
    let content = data.choices[0].message.content;
    console.log('AI原始回复:', content.substring(0,100));
    content = content.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    const json = content.match(/\{[\s\S]*\}/);
    if (!json) throw new Error('No JSON in: '+content.substring(0,50));
    const dec = JSON.parse(json[0]);
    console.log('AI决策:', dec.emotion, dec.action, dec.targetX, dec.reply||'');

    // 应用决策
    npc.aiConnected = true;
    npc.aiPending = false;
    npcAIConfig.errorCount = 0;
    if (dec.emotion) npc.emotion = dec.emotion;
    if (dec.thought) { npc.thought = dec.thought; npc.thoughtTimer = 150; npcThoughtBubble = {text:dec.thought, timer:120}; npcThoughtTop = {text:'💭 '+dec.thought, timer:300}; }
    if (dec.reply && dec.reply.trim() && (npc.dialogueCooldown<=0 || playerChatInput)) {
      npc.dialogue = dec.reply.substring(0,60); npc.dialogueTimer = 180; npc.dialogueCooldown = 200;
      npcBubble = {text:dec.reply, timer:150};
      npcReplyTop = {text:'命种者：'+dec.reply, timer:300};
      npc.chatHistory.push({role:'npc', text:dec.reply}); if(npc.chatHistory.length>20) npc.chatHistory.shift();
    }
    if (dec.action) npc.aiAction = dec.action;
    if (typeof dec.targetX === 'number') npc.aiTargetX = dec.targetX;
    // 治疗技能
    if (dec.heal === true && npc.healCD <= 0 && player.hp < player.maxHp) {
      player.hp = Math.min(player.maxHp, player.hp + 40);
      npc.healCD = npc.healMaxCD;
      const cx = player.x + player.w/2, cy = player.y + player.h/2;
      // 浮动+40
      damageNumbers.push({x:cx, y:player.y-10, text:'+40', life:55, color:'#5fa'});
      // 三重治疗光环
      npc._healRing = {x:cx, y:cy, radius:4, life:35};
      npc._healRing2 = {x:cx, y:cy, radius:2, life:25, delay:5};
      npc._healRing3 = {x:cx, y:cy, radius:8, life:20, delay:10};
      // 金色粒子爆发
      spawnParticles(cx, cy, 25, 'rgba(255,220,100,0.95)', 6);
      // 绿色粒子爆发
      spawnParticles(cx, cy, 20, 'rgba(100,255,180,0.9)', 5);
      // 白色光点（萤火虫上升）
      spawnParticles(cx, cy, 12, 'rgba(220,255,240,0.85)', 3);
      // 屏幕微震
      shakeAmount = Math.max(shakeAmount, 4);
      // 全屏闪光
      npc._healFlash = 12;
      console.log('NPC治疗! 玩家HP:', player.hp);
    }
    if (dec.memory && dec.memory.trim()) { npc.memory.push(dec.memory); if(npc.memory.length>20) npc.memory.shift(); }
    if (playerChatInput && dec.reply) { playerChatInput = ''; }

    document.getElementById('ai-status').textContent = 'AI●';
    document.getElementById('ai-status').style.color = '#4f8';
  } catch(e) {
    console.warn('AI决策失败:', e.message);
    npcAIConfig.errorCount++;
    npc.aiConnected = false;
    npc.aiPending = false;
    document.getElementById('ai-status').textContent = 'AI✕';
    document.getElementById('ai-status').style.color = '#f44';
    document.getElementById('ai-status').title = e.message;
    if (npcAIConfig.errorCount>=5) {
      document.getElementById('ai-status').textContent = 'AI✕连续失败，检查控制台';
    }
  }
  npcAIConfig.pending = false;
  // 玩家在pending期间发了消息 → 立即再调一次
  if (npcAIConfig._retryAfterPending) {
    npcAIConfig._retryAfterPending = false;
    npcAIConfig.cooldown = 0;
  }
}

// 信任值事件钩子（在processPlayerAttacks和怪物攻击中调用）
function npcAddTrust(amount) { npc.trust = Math.max(0, Math.min(100, npc.trust+amount)); }
function npcAddEvent(evt) { npc.events.push(evt); if(npc.events.length>20) npc.events.shift(); }

// ==================== 启动 ====================
console.log('寂灭守护 · AI Native');
console.log('A/D 移动 | J 普攻 | Q/U/I/O 技能 | K 跳跃 | Shift 冲刺 | T 对话');
console.log('点击右上角🤖配置火山方舟API：https://ark.cn-beijing.volces.com');
if (npcAIConfig.apiKey) {
  updateAIUI(true);
  console.log('AI NPC已配置，模型接入点:', npcAIConfig.model);
} else {
  console.log('⚠ 请配置火山方舟API Key和推理接入点ID');
  document.getElementById('ai-status').textContent = '未配置';
  document.getElementById('ai-status').style.color = '#f80';
}
gameLoop();
</script>
